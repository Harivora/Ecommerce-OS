# Production stack for the EC2 box (t3.small / 2 GB RAM).
# Postgres + Redis are MANAGED (RDS + ElastiCache) — only the app services +
# Caddy (TLS) run here. All config comes from /opt/commerce/.env (pulled from
# SSM at boot). Build context is ./backend.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: ./.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env
    # solo pool = single process (no forking), drastically cuts memory.
    # max-memory-per-child auto-recycles if it leaks past 150 MB.
    # -B embeds the beat scheduler so we don't need a separate container.
    command: >
      celery -A app.tasks.celery_app.celery_app worker
        --pool=solo
        --loglevel=info
        --max-memory-per-child=150000
        -B
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
